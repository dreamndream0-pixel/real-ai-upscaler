<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dual Mode Upscaler</title>
<style>
body{margin:0;font-family:system-ui;background:#f5f7fb}
.container{max-width:1200px;margin:auto;padding:20px}
.grid{display:grid;grid-template-columns:320px 1fr;gap:20px}
.card{background:#fff;border-radius:20px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
button{padding:10px;border:none;border-radius:12px;cursor:pointer}
.mode{display:flex;gap:10px}
.mode button{flex:1}
.active{background:black;color:white}
.preview{height:420px;background:#ddd;border-radius:20px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.preview img{max-width:100%;max-height:100%}
.split{position:absolute;top:0;bottom:0;width:2px;background:white;left:50%}
</style>
</head>
<body>
<div class="container">
<h2>AI 雙模式超解析</h2>

<div class="grid">
<div class="card">

<div class="mode">
<button id="natural" class="active">Natural</button>
<button id="enhance">Enhance</button>
</div>

<select id="pipeline">
<option value="natural">Natural Pipeline（穩定）</option>
<option value="enhance">Enhance Pipeline（強化）</option>
</select>

<select id="scale">
<option>2</option>
<option selected>4</option>
<option>6</option>
</select>

<input type="file" id="file">
<button id="run">開始增強</button>

<p id="msg"></p>

</div>

<div class="card">
<div class="preview">
<img id="imgBefore">
<img id="imgAfter" style="position:absolute;clip-path:inset(0 50% 0 0)">
<div class="split"></div>
</div>
</div>

</div>
</div>

<script>
let base64=""

file.onchange=e=>{
 const r=new FileReader()
 r.onload=()=>{
   base64=r.result
   imgBefore.src=base64
 }
 r.readAsDataURL(e.target.files[0])
}

natural.onclick=()=>{
 natural.classList.add("active")
 enhance.classList.remove("active")
 pipeline.value="natural"
}

enhance.onclick=()=>{
 enhance.classList.add("active")
 natural.classList.remove("active")
 pipeline.value="enhance"
}

run.onclick=async()=>{
 msg.innerText="處理中..."

 const res=await fetch("/api/predict",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    imageBase64:base64,
    pipeline:pipeline.value,
    scale:scale.value
  })
 })

 const data=await res.json()

 let done=false
 while(!done){
  await new Promise(r=>setTimeout(r,2000))
  const poll=await fetch("/api/poll?id="+data.id)
  const result=await poll.json()

  if(result.status==="succeeded"){
    const url=Array.isArray(result.output)?result.output[0]:result.output
    imgAfter.src=url
    msg.innerText="完成"
    done=true
  }
 }
}
</script>
</body>
</html>
